<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
            color: #000000;
            letter-spacing: 2px;
        }

        .logo p {
            color: #666666;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #333333;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 3px solid #c62828;
            display: none;
        }

        .demo-credentials {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
        }

        .demo-credentials p {
            font-size: 12px;
            color: #999999;
            margin-bottom: 8px;
        }

        .demo-item {
            font-size: 11px;
            color: #666666;
            font-family: monospace;
            margin: 4px 0;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>Система управления</h1>
        <p>Войдите в свой аккаунт</p>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="login">Логин</label>
            <input type="text" id="login" name="login" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit">Войти</button>
    </form>

    <div class="demo-credentials">
        <p>Тестовые учетные записи:</p>
        <div class="demo-item">📋 admin / admin123 (полный доступ)</div>
        <div class="demo-item">✏️ editor / editor123 (чтение + запись)</div>
        <div class="demo-item">👁️ viewer / viewer123 (только чтение)</div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        errorDiv.style.display = 'none';

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ login, password })
            });

            if (response.ok) {
                window.location.href = '/';
            } else if (response.status === 401) {
                const error = await response.json();
                errorDiv.textContent = error.error || 'Неверный логин или пароль';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.textContent = 'Ошибка сервера. Попробуйте позже.';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Ошибка соединения с сервером';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
